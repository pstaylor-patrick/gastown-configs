# Gas Town tmux configuration
# Tuned for multi-agent workloads (15-30+ concurrent Claude agents in tmux sessions)
#
# Install: symlink or copy to ~/.tmux.conf
# Reload: tmux source-file ~/.tmux.conf

# --- Terminal compatibility ---

# Use xterm-256color inside tmux for broad compatibility.
# Ghostty auto-detects xterm-ghostty for direct (non-tmux) sessions.
set -g default-terminal "xterm-256color"

# Enable true color (24-bit) passthrough from modern terminals (Ghostty, iTerm2, etc.)
set -ga terminal-overrides ",xterm-256color:Tc"

# --- Gas Town tuning ---

# Large scrollback — agent sessions produce verbose output
set -g history-limit 50000

# Near-zero escape delay — critical for responsive agent I/O
set -sg escape-time 10

# Longer status messages — useful when attaching to agent sessions
set -g display-time 4000

# Mouse support — makes navigating between agent panes easier
set -g mouse on

# --- Status bar ---

set -g status-position bottom
set -g status-interval 5
